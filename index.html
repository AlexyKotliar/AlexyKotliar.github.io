/* ============ WINDOW MANAGER ============ */
const WM = (function(){
  const layer=document.getElementById('winlayer');
  let z=100; const open={};
  function clampX(x,w){return Math.max(4,Math.min(x, window.innerWidth-w-4));}
  function clampY(y,h){return Math.max(4,Math.min(y, window.innerHeight-30-h-4));}
  function focus(id){ const w=open[id]; if(!w)return; z++; w.el.style.zIndex=z;
    document.querySelectorAll('.win').forEach(e=>e.classList.remove('focused')); w.el.classList.add('focused'); updateDock(); }
  function openApp(id){
    if(open[id]){ focus(id); return; }
    const a=APPS[id]; if(!a) return;
    const el=document.createElement('div'); el.className='win';
    const w=Math.min(a.w, window.innerWidth-20), h=Math.min(a.h, window.innerHeight-60);
    el.style.width=w+'px'; el.style.height=h+'px';
    el.style.left=clampX(a.x,w)+'px'; el.style.top=clampY(a.y,h)+'px';
    el.innerHTML=`<div class="titlebar ${a.term?'term':''}">
        <div class="wbtns"><button class="wbtn close" title="Close">✕</button><button class="wbtn min" title="Minimize">–</button><button class="wbtn max" title="Maximize">▢</button></div>
        <div class="tt"><span class="ic">${a.icon}</span>${esc(a.title)}</div>
        <div class="wbtns right" style="width:56px"></div>
      </div><div class="body">${typeof a.html==='function'?a.html():a.html}</div><div class="resz" title="Drag to resize"></div>`;
    layer.appendChild(el);
    open[id]={el};
    el.addEventListener('mousedown',()=>focus(id));
    el.querySelector('.close').addEventListener('click',e=>{e.stopPropagation();close(id);});
    el.querySelector('.min').addEventListener('click',e=>{e.stopPropagation();close(id);});
    el.querySelector('.max').addEventListener('click',e=>{e.stopPropagation();toggleMax(id);});
    dragify(el.querySelector('.titlebar'), el, id);
    resizify(el.querySelector('.resz'), el, id);
    if(a.bars){ setTimeout(()=>el.querySelectorAll('.bar i').forEach(b=>b.style.width=b.dataset.w+'%'),120); }
    if(a.init) a.init(el);
    focus(id);
  }
  function toggleMax(id){ const w=open[id]; if(!w)return; const el=w.el;
    if(w.prev){ Object.assign(el.style,w.prev); w.prev=null; }
    else{ w.prev={left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height};
      el.style.left='6px'; el.style.top='6px'; el.style.width=(window.innerWidth-16)+'px'; el.style.height=(window.innerHeight-30-12)+'px'; }
  }
  function close(id){ const w=open[id]; if(!w)return; w.el.remove(); delete open[id]; updateDock(); }
  function dragify(handle, el, id){
    let sx,sy,ox,oy,drag=false;
    handle.addEventListener('mousedown',e=>{ if(e.target.classList.contains('wbtn'))return;
      drag=true; sx=e.clientX; sy=e.clientY; ox=el.offsetLeft; oy=el.offsetTop; focus(id);
      document.body.style.userSelect='none'; e.preventDefault(); });
    window.addEventListener('mousemove',e=>{ if(!drag)return;
      el.style.left=clampX(ox+e.clientX-sx, el.offsetWidth)+'px';
      el.style.top=clampY(oy+e.clientY-sy, el.offsetHeight)+'px'; });
    window.addEventListener('mouseup',()=>{ drag=false; document.body.style.userSelect=''; });
  }
  function resizify(handle, el, id){
    let sx,sy,sw,sh,rz=false;
    handle.addEventListener('mousedown',e=>{ rz=true; sx=e.clientX; sy=e.clientY; sw=el.offsetWidth; sh=el.offsetHeight; focus(id); document.body.style.userSelect='none'; e.preventDefault(); e.stopPropagation(); });
    window.addEventListener('mousemove',e=>{ if(!rz)return;
      const nw=Math.max(280, Math.min(sw+e.clientX-sx, window.innerWidth-el.offsetLeft-4));
      const nh=Math.max(150, Math.min(sh+e.clientY-sy, window.innerHeight-30-el.offsetTop-4));
      el.style.width=nw+'px'; el.style.height=nh+'px'; });
    window.addEventListener('mouseup',()=>{ rz=false; document.body.style.userSelect=''; });
  }
  function cascade(){ let i=0; Object.keys(open).forEach(id=>{ const el=open[id].el; el.style.left=(60+i*34)+'px'; el.style.top=(50+i*30)+'px'; i++; focus(id); }); }
  function isOpen(id){return !!open[id];}
  return {open:openApp, close, focus, cascade, isOpen};
})();

/* ============ ask.sh ============ */
function initAsk(root){
  const log=root.querySelector('#askLog'), form=root.querySelector('#askForm'), input=root.querySelector('#askInput'), sg=root.querySelector('#askSg');
  SUGGEST.forEach(s=>{ const b=document.createElement('button'); b.type='button'; b.className='sg'; b.textContent=s; b.onclick=()=>ask(s); sg.appendChild(b); });
  function answer(q){ const t=q.toLowerCase(); let best=null,sc=0;
    KB.forEach(it=>{let s=0;it.keys.forEach(k=>{if(t.includes(k))s+=k.length;});if(s>sc){sc=s;best=it;}});
    return (best&&sc>0)?best.a:"Good question — try asking about experience, leadership, AI work, tech stack, education, or contact. Or grab the <a href='Alex_Kotliar_CV.pdf' download>PDF CV</a>."; }
  function ask(q){ const row=document.createElement('div'); row.className='ask-row';
    row.innerHTML=`<div class="ask-q"><span class="pr">❯</span> ${esc(q)}</div><div class="ask-a"></div>`;
    log.appendChild(row); const a=row.querySelector('.ask-a'); const text=answer(q);
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){a.innerHTML=text;log.scrollTop=log.scrollHeight;return;}
    let i=0;(function tw(){ if(i<=text.length){ const c=text.slice(0,i);
        if(((c.match(/</g)||[]).length)===((c.match(/>/g)||[]).length)) a.innerHTML=c;
        i++; log.scrollTop=log.scrollHeight; setTimeout(tw,8);} else {a.innerHTML=text;log.scrollTop=log.scrollHeight;} })(); }
  form.addEventListener('submit',e=>{e.preventDefault();const v=input.value.trim();if(!v)return;ask(v);input.value='';});
  setTimeout(()=>ask("hello"),250);
}
